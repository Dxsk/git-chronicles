name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR / branch when a new push
# arrives. Releases and deploys live in separate workflows so no risk
# of cancelling a deploy mid-flight.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)
      - uses: ./.github/actions/setup

      - name: Install test tooling
        run: ./scripts/ci/install-test-tools.sh

      # lint-links and lint-a11y depend on a successful build, so
      # running `make lint` would trigger the full build inside the
      # lint job. We skip those two here: the build job below runs
      # them (via `make build`), and the standalone lint job focuses
      # on fast static checks.
      - name: Spell check
        run: make lint-spell

      - name: i18n parity
        run: make lint-i18n

      - name: Shellcheck
        run: make lint-shell

      - name: actionlint
        run: make lint-ci

      - name: PSScriptAnalyzer
        run: make lint-powershell

  test:
    name: Verifier regression tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)
      - uses: ./.github/actions/setup

      - name: Install test tooling
        run: ./scripts/ci/install-test-tools.sh

      - name: Run bats + Pester regression tests
        run: make test

  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)
      - uses: ./.github/actions/setup

      - run: make build

      - name: Link check (internal)
        run: npm run check:links

      - name: Accessibility check
        run: npm run check:a11y
