name: Package Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: package-release
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release zip
        run: ./scripts/package-release.sh

      - name: Publish rolling 'latest' release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd build

          ZIP_HASH=$(awk '{print $1}' git-chronicles.zip.sha256)

          NOTES="Automated build from commit ${{ github.sha }}.

          SHA-256: \`$ZIP_HASH\`

          Verify locally:
          \`\`\`
          sha256sum -c git-chronicles.zip.sha256
          \`\`\`"

          # Edit-or-create: keep the 'latest' tag stable, move it to the
          # new commit, replace the two assets. Avoids delete+recreate
          # race windows and surfaces real errors.
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest \
              git-chronicles.zip git-chronicles.zip.sha256 --clobber
            gh release edit latest \
              --target "${{ github.sha }}" \
              --title "Latest build" \
              --notes "$NOTES"
          else
            gh release create latest \
              --target "${{ github.sha }}" \
              --title "Latest build" \
              --notes "$NOTES" \
              git-chronicles.zip git-chronicles.zip.sha256
          fi
