name: Check Links

on:
  push:
    branches: [main]
    paths: ['**.njk', '**.md', 'src/**', '.lychee.toml', '.github/workflows/links.yml']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx eleventy

      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --config .lychee.toml --root-dir _site '_site/**/*.html'
          fail: true
