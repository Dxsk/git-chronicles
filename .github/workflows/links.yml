name: Check Links

on:
  push:
    branches: [main]
    paths: ['**.njk', '**.md', 'src/**', '.lychee.toml', '.github/workflows/links.yml']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (v4.3.1)
      - uses: ./.github/actions/setup

      - run: npx eleventy

      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2 (v2.8.0)
        with:
          args: --no-progress --config .lychee.toml --root-dir _site '_site/**/*.html'
          fail: true
