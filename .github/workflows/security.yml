name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - 'package*.json'
  schedule:
    - cron: '0 8 * * *'  # Every day at 10:00 Europe/Paris (UTC+2)
  workflow_dispatch:

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Run security audit
        run: npm audit --omit=dev
