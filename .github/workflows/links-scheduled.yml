name: Check Links

on:
  push:
    branches: [main]
    paths: ['**.njk', '**.md', 'src/**', '.lychee.toml', '.github/workflows/links-scheduled.yml']
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 (v6.0.2)
      - uses: ./.github/actions/setup

      - run: npx eleventy

      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2 (v2.8.0)
        with:
          args: --no-progress --config .lychee.toml --root-dir _site '_site/**/*.html'
          fail: true
