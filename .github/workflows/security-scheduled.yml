name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - 'package*.json'
  schedule:
    - cron: '0 8 * * *'  # Every day at 10:00 Europe/Paris (UTC+2)
  workflow_dispatch:

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6 (v6.0.2)
      - uses: ./.github/actions/setup

      - name: Run security audit
        run: npm audit --omit=dev
