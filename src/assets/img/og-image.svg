<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf3e3"/>
      <stop offset="100%" stop-color="#f4e4c1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative border (parchment style) -->
  <rect x="40" y="40" width="1120" height="550" rx="4" fill="none" stroke="#d4bf8a" stroke-width="1" stroke-dasharray="8,4"/>
  <rect x="50" y="50" width="1100" height="530" rx="4" fill="none" stroke="#c8a951" stroke-width="1.5"/>

  <!-- Scroll/book icon -->
  <g transform="translate(540, 90)">
    <rect x="0" y="0" width="120" height="80" rx="4" fill="none" stroke="#c8a951" stroke-width="2"/>
    <line x1="20" y1="20" x2="100" y2="20" stroke="#d4bf8a" stroke-width="2"/>
    <line x1="20" y1="35" x2="80" y2="35" stroke="#d4bf8a" stroke-width="2"/>
    <line x1="20" y1="50" x2="90" y2="50" stroke="#d4bf8a" stroke-width="2"/>
    <line x1="20" y1="65" x2="60" y2="65" stroke="#d4bf8a" stroke-width="2"/>
    <circle cx="108" cy="15" r="5" fill="none" stroke="#2d5016" stroke-width="2"/>
    <circle cx="108" cy="35" r="5" fill="none" stroke="#8b6914" stroke-width="2"/>
    <line x1="108" y1="20" x2="108" y2="30" stroke="#3b2a1a" stroke-width="2"/>
  </g>

  <!-- Title -->
  <text x="600" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#3b2a1a">The Git Chronicles</text>
  <text x="600" y="270" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-style="italic" fill="#8b6914">Les Chroniques du Versionneur</text>

  <!-- Divider -->
  <line x1="400" y1="300" x2="800" y2="300" stroke="#d4bf8a" stroke-width="1"/>
  <circle cx="600" cy="300" r="4" fill="#c8a951"/>

  <!-- Quest list -->
  <text x="420" y="345" text-anchor="middle" font-family="monospace" font-size="16" fill="#2d5016">Quest I</text>
  <text x="420" y="365" text-anchor="middle" font-family="monospace" font-size="14" fill="#4a3020">The First Commit</text>

  <text x="600" y="345" text-anchor="middle" font-family="monospace" font-size="16" fill="#2d5016">Quest II</text>
  <text x="600" y="365" text-anchor="middle" font-family="monospace" font-size="14" fill="#4a3020">The Branch Explorer</text>

  <text x="780" y="345" text-anchor="middle" font-family="monospace" font-size="16" fill="#2d5016">Quest III</text>
  <text x="780" y="365" text-anchor="middle" font-family="monospace" font-size="14" fill="#4a3020">The Merge Master</text>

  <!-- Stars -->
  <text x="355" y="348" font-family="monospace" font-size="14" fill="#c8a951">*</text>
  <text x="535" y="348" font-family="monospace" font-size="14" fill="#c8a951">*</text>
  <text x="715" y="348" font-family="monospace" font-size="14" fill="#c8a951">*</text>
  <text x="845" y="348" font-family="monospace" font-size="14" fill="#c8a951">*</text>

  <!-- Tagline -->
  <text x="600" y="425" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#3b2a1a">29 quests to master Git through hands-on practice</text>

  <!-- Terminal hint -->
  <rect x="420" y="455" width="360" height="36" rx="6" fill="#2d2d2d" stroke="#4a3020" stroke-width="1"/>
  <text x="440" y="479" font-family="monospace" font-size="14" fill="#2d5016">$</text>
  <text x="458" y="479" font-family="monospace" font-size="14" fill="#c8a951">git</text>
  <text x="490" y="479" font-family="monospace" font-size="14" fill="#f4e4c1">clone your-adventure</text>
  <rect x="665" y="465" width="8" height="16" fill="#2d5016"/>

  <!-- URL -->
  <text x="600" y="535" text-anchor="middle" font-family="monospace" font-size="16" fill="#8b6914">git.learning.dxscloud.fr</text>
  <text x="600" y="560" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#4a3020">Free and Open Source - Available in English and French - Made by Dxsk with &#x2764;</text>
</svg>
